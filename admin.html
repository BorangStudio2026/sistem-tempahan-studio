<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | PBS UMK</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    
    <style>
        :root {
            --primary: #003366;
            --accent: #d4af37;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --sidebar-width: 260px;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f4f7fa; 
            margin: 0; 
            display: flex;
            color: #1e293b;
        }

        /* Sidebar Styling */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--primary);
            height: 100vh;
            position: fixed;
            color: white;
            padding: 30px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar h2 { font-size: 1.2rem; font-weight: 800; margin-bottom: 40px; border-left: 4px solid var(--accent); padding-left: 15px; }
        
        .nav-item { 
            padding: 12px 15px; border-radius: 10px; margin-bottom: 10px; 
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px;
            font-weight: 500; font-size: 0.9rem; opacity: 0.7;
        }
        .nav-item.active { background: rgba(255,255,255,0.1); opacity: 1; border-right: 3px solid var(--accent); }
        .nav-item:hover { opacity: 1; background: rgba(255,255,255,0.05); }

        /* Main Content */
        .main-content {
            margin-left: var(--sidebar-width);
            width: calc(100% - var(--sidebar-width));
            padding: 40px;
            box-sizing: border-box;
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .top-bar h1 { font-size: 1.5rem; font-weight: 800; margin: 0; }

        /* Stats Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; margin-bottom: 40px; }
        .stat-card { 
            background: white; padding: 25px; border-radius: 20px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            display: flex; flex-direction: column; position: relative; overflow: hidden;
        }
        .stat-card span { font-size: 0.8rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card h2 { font-size: 2.2rem; margin: 10px 0 0; color: var(--primary); }
        .stat-card::after { content: ""; position: absolute; bottom: 0; left: 0; height: 4px; width: 100%; }
        .stat-pending::after { background: var(--warning); }
        .stat-approved::after { background: var(--success); }
        .stat-total::after { background: var(--primary); }

        /* Table Area */
        .table-section { 
            background: white; border-radius: 24px; 
            box-shadow: 0 20px 50px -10px rgba(0,0,0,0.08); overflow: hidden;
        }
        .table-header { padding: 25px 30px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; }
        .table-header h3 { margin: 0; font-size: 1.1rem; }

        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 18px 25px; text-align: left; font-size: 0.7rem; text-transform: uppercase; color: #94a3b8; letter-spacing: 1px; }
        td { padding: 20px 25px; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; }
        
        .user-info strong { color: var(--primary); display: block; margin-bottom: 4px; }
        .user-info small { color: #94a3b8; font-weight: 500; }

        .status-pill { 
            padding: 6px 14px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; 
            display: inline-flex; align-items: center; gap: 6px;
        }
        .pill-menunggu { background: #fffbeb; color: #b45309; }
        .pill-lulus { background: #ecfdf5; color: #065f46; }
        .pill-tolak { background: #fef2f2; color: #991b1b; }

        /* Pulse Animation for Pending */
        .pulse { width: 8px; height: 8px; border-radius: 50%; background: currentColor; animation: pulse-anim 1.5s infinite; }
        @keyframes pulse-anim { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }

        .btn-group { display: flex; gap: 8px; }
        .action-btn { 
            border: none; padding: 8px; border-radius: 8px; cursor: pointer; 
            transition: 0.2s; display: flex; align-items: center; justify-content: center;
        }
        .btn-check { background: #ecfdf5; color: #10b981; border: 1px solid #d1fae5; }
        .btn-check:hover { background: #10b981; color: white; }
        .btn-x { background: #fef2f2; color: #ef4444; border: 1px solid #fee2e2; }
        .btn-x:hover { background: #ef4444; color: white; }

        .tech-tag { font-size: 0.8rem; background: #f8fafc; border: 1px solid #e2e8f0; padding: 8px; border-radius: 10px; color: #64748b; }

        @media (max-width: 1024px) {
            .sidebar { width: 80px; padding: 30px 10px; }
            .sidebar h2, .nav-item span { display: none; }
            .main-content { margin-left: 80px; width: calc(100% - 80px); }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>PBS ADMIN</h2>
    <div class="nav-item active"><span>🏠</span> <span>Dashboard</span></div>
    <div class="nav-item"><span>📊</span> <span>Laporan</span></div>
    <div class="nav-item"><span>⚙️</span> <span>Tetapan</span></div>
</div>

<div class="main-content">
    <div class="top-bar">
        <h1>Ringkasan Tempahan</h1>
        <button class="action-btn btn-check" style="padding: 10px 20px;" onclick="fetchBookings()">🔄 Segarkan Data</button>
    </div>

    <div class="stats-grid">
        <div class="stat-card stat-pending"><span>Menunggu</span><h2 id="pending-count">0</h2></div>
        <div class="stat-card stat-approved"><span>Lulus</span><h2 id="approved-count">0</h2></div>
        <div class="stat-card stat-total"><span>Jumlah</span><h2 id="total-count">0</h2></div>
    </div>

    <div class="table-section">
        <div class="table-header">
            <h3>Senarai Permohonan</h3>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Pemohon</th>
                    <th>Studio & Lokasi</th>
                    <th>Tempoh Tempahan</th>
                    <th>Status</th>
                    <th>Tindakan</th>
                </tr>
            </thead>
            <tbody id="adminTableBody">
                <tr><td colspan="5" style="text-align:center; padding:50px;">Memuatkan data...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const supabaseUrl = 'https://lweolipmulciepadidvk.supabase.co';
    const supabaseKey = 'sb_publishable_V-12ORVq7uTmuKk9X8PPnQ_hcm_J2c2';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    async function fetchBookings() {
        const { data, error } = await _supabase
            .from('bookings')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) return;
        renderAdminTable(data);
        updateDashboardStats(data);
    }

    function renderAdminTable(bookings) {
        const tbody = document.getElementById('adminTableBody');
        tbody.innerHTML = '';

        bookings.forEach(item => {
            const row = document.createElement('tr');
            const statusClass = item.status.toLowerCase();
            
            row.innerHTML = `
                <td>
                    <div class="user-info">
                        <strong>${item.full_name}</strong>
                        <small>${item.student_staff_id} • ${item.category}</small>
                    </div>
                </td>
                <td>
                    <div class="user-info">
                        <strong>${item.studio_name}</strong>
                        <small>Kampus ${item.campus.toUpperCase()}</small>
                    </div>
                </td>
                <td>
                    <div class="user-info">
                        <strong>${item.start_date}</strong>
                        <small>${item.start_time} - ${item.end_time}</small>
                    </div>
                </td>
                <td>
                    <span class="status-pill pill-${statusClass}">
                        ${statusClass === 'menunggu' ? '<div class="pulse"></div>' : ''}
                        ${item.status}
                    </span>
                </td>
                <td>
                    <div class="btn-group">
                        ${item.status === 'Menunggu' ? `
                            <button class="action-btn btn-check" title="Luluskan" onclick="changeStatus(${item.id}, 'Lulus')">✅</button>
                            <button class="action-btn btn-x" title="Tolak" onclick="changeStatus(${item.id}, 'Tolak')">❌</button>
                        ` : '<span style="font-size:0.7rem; color:#cbd5e1; font-weight:700;">PROSES SELESAI</span>'}
                        <button class="action-btn" style="background:#f1f5f9" onclick="window.open('https://wa.me/6${item.phone}')">💬</button>
                    </div>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    async function changeStatus(id, newStatus) {
        if (!confirm(`Sahkan status ${newStatus}?`)) return;

        const { data: applicant } = await _supabase.from('bookings').select('*').eq('id', id).single();
        const { error } = await _supabase.from('bookings').update({ status: newStatus }).eq('id', id);

        if (!error) {
            alert("Berjaya dikemaskini.");
            fetchBookings();
            // Panggil EmailJS di sini jika perlu
        }
    }

    function updateDashboardStats(bookings) {
        document.getElementById('pending-count').innerText = bookings.filter(b => b.status === 'Menunggu').length;
        document.getElementById('approved-count').innerText = bookings.filter(b => b.status === 'Lulus').length;
        document.getElementById('total-count').innerText = bookings.length;
    }

    fetchBookings();
</script>
</body>
</html>
